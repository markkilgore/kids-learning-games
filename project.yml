name: SharkExplorer
options:
  bundleIdPrefix: com.mkilgore
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "2"
    SUPPORTS_MACCATALYST: NO

targets:
  LearningEngine:
    type: framework
    platform: iOS
    sources: packages/learning-engine/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mkilgore.learning-engine
        GENERATE_INFOPLIST_FILE: YES

  LearningPersistence:
    type: framework
    platform: iOS
    sources: packages/persistence/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mkilgore.learning-persistence
        GENERATE_INFOPLIST_FILE: YES

  Narration:
    type: framework
    platform: iOS
    sources: packages/narration/Sources
    dependencies:
      - target: LearningEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mkilgore.narration
        GENERATE_INFOPLIST_FILE: YES

  LearningUI:
    type: framework
    platform: iOS
    sources: packages/ui-components/Sources
    dependencies:
      - target: LearningEngine
      - target: Narration
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mkilgore.learning-ui
        GENERATE_INFOPLIST_FILE: YES

  SharkExplorer:
    type: application
    platform: iOS
    sources:
      - path: apps/shark-explorer/Sources
      - path: apps/shark-explorer/Resources
        buildPhase: resources
        excludes:
          - catalog.source.json
          - "**/.gitkeep"
    dependencies:
      - target: LearningEngine
      - target: LearningPersistence
      - target: Narration
      - target: LearningUI
    configFiles:
      Debug: apps/shark-explorer/Config/Debug.xcconfig
      Release: apps/shark-explorer/Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mkilgore.SharkExplorer
        PRODUCT_NAME: SharkExplorer
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
    info:
      path: apps/shark-explorer/Info.plist
      properties:
        CFBundleDisplayName: "Shark Explorer"
        UILaunchScreen:
          UIImageName: SharkSplash
          UIColorName: SharkSplashBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    scheme:
      testTargets:
        - SharkExplorerTests
        - LearningPersistenceTests

  CatMathAdventure:
    type: application
    platform: iOS
    sources:
      - path: apps/cat-math/Sources
      - path: apps/cat-math/Resources
        buildPhase: resources
    dependencies:
      - target: LearningEngine
      - target: LearningPersistence
      - target: Narration
      - target: LearningUI
    configFiles:
      Debug: apps/cat-math/Config/Debug.xcconfig
      Release: apps/cat-math/Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mkilgore.CatMathAdventure
        PRODUCT_NAME: CatMathAdventure
        ASSETCATALOG_COMPILER_APPICON_NAME: CatAppIcon
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
    info:
      path: apps/cat-math/Info.plist
      properties:
        CFBundleDisplayName: "Cat Math Adventure"
        UILaunchScreen:
          UIImageName: CatSplash
          UIColorName: CatSplashBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    scheme:
      testTargets:
        - CatMathAdventureTests
        - LearningPersistenceTests

  SharkExplorerTests:
    type: bundle.unit-test
    platform: iOS
    sources: apps/shark-explorer/Tests
    dependencies:
      - target: SharkExplorer
      - target: LearningPersistence
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mkilgore.SharkExplorerTests
        GENERATE_INFOPLIST_FILE: YES

  CatMathAdventureTests:
    type: bundle.unit-test
    platform: iOS
    sources: apps/cat-math/Tests
    dependencies:
      - target: CatMathAdventure
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mkilgore.CatMathAdventureTests
        GENERATE_INFOPLIST_FILE: YES

  LearningPersistenceTests:
    type: bundle.unit-test
    platform: iOS
    sources: packages/persistence/Tests
    dependencies:
      - target: LearningPersistence
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mkilgore.LearningPersistenceTests
        GENERATE_INFOPLIST_FILE: YES
